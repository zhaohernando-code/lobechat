name: lobehub-local

services:
  lobe:
    image: ${LOBEHUB_IMAGE:-lobehub-custom:latest}
    container_name: lobehub-app
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
      searxng:
        condition: service_started
    ports:
      - "127.0.0.1:${LOBE_PORT:-3210}:3210"
    environment:
      APP_URL: ${APP_URL:-https://hernando-zhao.cn}
      INTERNAL_APP_URL: ${INTERNAL_APP_URL:-http://lobe:3210}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_ALLOWED_EMAILS: ${AUTH_ALLOWED_EMAILS}
      AUTH_DISABLE_EMAIL_PASSWORD: ${AUTH_DISABLE_EMAIL_PASSWORD:-0}
      AUTH_EMAIL_VERIFICATION: ${AUTH_EMAIL_VERIFICATION:-0}
      AUTH_TRUSTED_ORIGINS: ${AUTH_TRUSTED_ORIGINS:-https://hernando-zhao.cn}
      AUTH_SSO_PROVIDERS: ${AUTH_SSO_PROVIDERS:-}
      AUTH_GENERIC_OIDC_ID: ${AUTH_GENERIC_OIDC_ID:-}
      AUTH_GENERIC_OIDC_SECRET: ${AUTH_GENERIC_OIDC_SECRET:-}
      AUTH_GENERIC_OIDC_ISSUER: ${AUTH_GENERIC_OIDC_ISSUER:-}
      KEY_VAULTS_SECRET: ${KEY_VAULTS_SECRET}
      DATABASE_DRIVER: ${DATABASE_DRIVER:-node}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgresql:5432/${LOBE_DB_NAME:-lobechat}
      REDIS_URL: redis://redis:6379/0
      REDIS_PREFIX: lobechat
      REDIS_TLS: "0"
      S3_ENDPOINT: ${S3_ENDPOINT:-http://rustfs:9000}
      S3_PUBLIC_DOMAIN: ${S3_PUBLIC_DOMAIN:-https://hernando-zhao.cn/chat-s3}
      S3_BUCKET: ${RUSTFS_LOBE_BUCKET:-lobe}
      S3_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      S3_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY}
      S3_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY}
      S3_ENABLE_PATH_STYLE: "1"
      S3_SET_ACL: "0"
      LLM_VISION_IMAGE_USE_BASE64: "1"
      SEARXNG_URL: http://searxng:8080
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_PROXY_URL: ${OPENAI_PROXY_URL:-https://api.openai.com/v1}
      OPENAI_MODEL_LIST: ${OPENAI_MODEL_LIST:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL_LIST: ${ANTHROPIC_MODEL_LIST:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_MODEL_LIST: ${GOOGLE_MODEL_LIST:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_PROXY_URL: ${DEEPSEEK_PROXY_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_MODEL_LIST: ${DEEPSEEK_MODEL_LIST:-deepseek-chat,deepseek-reasoner}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-127.0.0.1,localhost,postgresql,redis,rustfs,searxng,lobe}
    networks:
      - lobehub

  postgresql:
    image: paradedb/paradedb:latest-pg17
    container_name: lobehub-postgresql
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-54329}:5432"
    environment:
      POSTGRES_DB: ${LOBE_DB_NAME:-lobechat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${LOBE_DATA_DIR:-/Users/hernando_zhao/codex/projects/lobechat/data}/postgresql:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${LOBE_DB_NAME:-lobechat}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lobehub

  redis:
    image: redis:7-alpine
    container_name: lobehub-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-63790}:6379"
    volumes:
      - ${LOBE_DATA_DIR:-/Users/hernando_zhao/codex/projects/lobechat/data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lobehub

  rustfs:
    image: rustfs/rustfs:latest
    container_name: lobehub-rustfs
    restart: unless-stopped
    ports:
      - "127.0.0.1:${RUSTFS_PORT:-9000}:9000"
      - "127.0.0.1:${RUSTFS_CONSOLE_PORT:-9001}:9001"
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - ${LOBE_DATA_DIR:-/Users/hernando_zhao/codex/projects/lobechat/data}/rustfs:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/health >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    command: ["--access-key", "${RUSTFS_ACCESS_KEY}", "--secret-key", "${RUSTFS_SECRET_KEY}", "/data"]
    networks:
      - lobehub

  rustfs-init:
    image: minio/mc:latest
    container_name: lobehub-rustfs-init
    depends_on:
      rustfs:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      until mc alias set rustfs http://rustfs:9000 \"$${RUSTFS_ACCESS_KEY}\" \"$${RUSTFS_SECRET_KEY}\"; do sleep 2; done;
      mc mb -p rustfs/$${RUSTFS_LOBE_BUCKET:-lobe} || true;
      mc anonymous set download rustfs/$${RUSTFS_LOBE_BUCKET:-lobe} || true;
      "
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      RUSTFS_LOBE_BUCKET: ${RUSTFS_LOBE_BUCKET:-lobe}
    networks:
      - lobehub

  searxng:
    image: searxng/searxng:latest
    container_name: lobehub-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SEARXNG_PORT:-18080}:8080"
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml:ro
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
    networks:
      - lobehub

networks:
  lobehub:
    driver: bridge
